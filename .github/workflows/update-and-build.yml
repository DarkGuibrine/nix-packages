name: Update sources and build cache

on:
  push:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cache
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-24.04
    outputs:
      updated: ${{ steps.update.outputs.updated }}
    steps:
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update sources
        id: update
        run: |
          nix run .#nvfetcher
          nix flake update
          if git diff --quiet; then
            echo "unchanged"
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed"
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload new lockfiles
        if: steps.update.outputs.updated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-lockfiles
          path: |
            flake.lock
            _sources/

  build:
    needs: update
    if: needs.update.outputs.updated == 'true' || github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
          #- runner: ubuntu-24.04-arm
    steps:
      - name: Reclaim space!
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'holster'
          nix-permission-edict: true

      - name: Get current month
        id: date
        run: echo "month=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Restore and save Nix evaluation cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/nix
          key: nix-eval-cache-${{ runner.os }}-${{ steps.date.outputs.month }}

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            build-dir = /nix/build

      - name: Ensure nix.conf exists
        run: sudo mkdir -p /etc/nix && sudo touch /etc/nix/nix.conf

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: darkguibrine
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download new lockfiles
        if: needs.update.outputs.updated == 'true'
        uses: actions/download-artifact@v4
        with:
          name: updated-lockfiles
          path: .

      # Adicionado continue-on-error para não matar o job instantaneamente se a hash falhar
      - name: Build cache
        id: build_step
        continue-on-error: true
        run: |
          cachix watch-exec -m xz -l 9 darkguibrine -- \
            nix run --inputs-from . nixpkgs#nix-fast-build -- \
            --no-nom --skip-cached --fail-fast --file ./ci-cache.nix

      # Se o build falhar, roda a correção automática e gera um patch
      - name: Fix hash mismatch automatically
        if: steps.build_step.outcome == 'failure'
        run: |
          echo "Build falhou! Tentando corrigir vendorHash / cargoHash..."
          nix run github:DeterminateSystems/determinate-nixd -- fix hashes || true
          
          if ! git diff --quiet; then
            echo "Hashes corrigidos! Criando patch..."
            git diff > hash-fix.patch
          fi

      - name: Upload fixed hashes patch
        if: steps.build_step.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: hash-fix
          path: hash-fix.patch
          if-no-files-found: ignore

      # Agora sim falhamos o job de build para o GitHub mostrar o 'X' vermelho
      - name: Enforce build failure
        if: steps.build_step.outcome == 'failure'
        run: exit 1

  commit:
    needs: [update, build]
    # Roda sempre (mesmo se o build falhar para poder aplicar o patch), mas não se for cancelado
    if: ${{ !cancelled() && needs.update.outputs.updated == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download new lockfiles
        uses: actions/download-artifact@v4
        with:
          name: updated-lockfiles
          path: .

      - name: Download hash fixes (if any)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: hash-fix
          path: .

      - name: Make commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add flake.lock _sources/
          
          # Se o patch foi gerado no job de build, aplica aqui
          if [ -f hash-fix.patch ]; then
            git apply hash-fix.patch || true
            # Adiciona os arquivos .nix que tiveram os hashes atualizados
            git add *.nix
          fi
          
          # Verifica se tem alguma coisa na staging area antes de commitar
          if ! git diff --staged --quiet; then
            git commit -m "chore(deps): bump sources and auto-fix hashes to $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
